server.port=8080

spring.config.import=optional:file:.env.properties

# Database Configuration (Defaults to H2 In-Memory DB, overrides with ENV variables for production)
spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:crystalbeatsdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.driver-class-name=${DATABASE_DRIVER:org.h2.Driver}
spring.datasource.username=${DATABASE_USERNAME:sa}
spring.datasource.password=${DATABASE_PASSWORD:}

# JPA Configuration
spring.jpa.database-platform=${DATABASE_DIALECT:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=${DATABASE_DDL:create-drop}
spring.jpa.show-sql=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT
# Generate a strong secret: openssl rand -base64 64
jwt.secret=${JWT_SECRET:}
jwt.expiration=86400000

# Cloudinary (used directly from browser — no server config needed)

# Google OAuth
google.client.id=630182104056-b0jkkc3c9mtg1a3bc3l6rjf1bsh6qbq6.apps.googleusercontent.com

# --- Supabase Database Configuration ---
# Paste your Supabase URI below, but replace "postgresql://" with "jdbc:postgresql://"
DATABASE_URL=jdbc:postgresql://aws-1-ap-south-1.pooler.supabase.com:5432/postgres

# The username is usually "postgres.yourprojectid"
DATABASE_USERNAME=postgres.yxizlnazphlfxzbrhdfu

# Replace this with the database password you created
# The password is securely loaded from the .env file or Render environment variables!
DATABASE_PASSWORD=${DATABASE_PASSWORD}

# Database Driver & Dialect for PostgreSQL
DATABASE_DRIVER=org.postgresql.Driver
DATABASE_DIALECT=org.hibernate.dialect.PostgreSQLDialect
DATABASE_DDL=update
