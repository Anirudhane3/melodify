server.port=8080

spring.config.import=optional:file:.env.properties

# Database Configuration (Defaults to H2 In-Memory DB, overrides with ENV variables for production)
spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:crystalbeatsdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.driver-class-name=${DATABASE_DRIVER:org.h2.Driver}
spring.datasource.username=${DATABASE_USERNAME:sa}
spring.datasource.password=${DATABASE_PASSWORD:}

# JPA Configuration
spring.jpa.database-platform=${DATABASE_DIALECT:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=${DATABASE_DDL:create-drop}
spring.jpa.show-sql=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT
jwt.secret=${JWT_SECRET:}
jwt.expiration=86400000

# Google OAuth
google.client.id=630182104056-b0jkkc3c9mtg1a3bc3l6rjf1bsh6qbq6.apps.googleusercontent.com

# --- Supabase Database Configuration ---
DATABASE_URL=jdbc:postgresql://aws-1-ap-south-1.pooler.supabase.com:5432/postgres
DATABASE_USERNAME=postgres.yxizlnazphlfxzbrhdfu
DATABASE_PASSWORD=${DATABASE_PASSWORD}
DATABASE_DRIVER=org.postgresql.Driver
DATABASE_DIALECT=org.hibernate.dialect.PostgreSQLDialect
DATABASE_DDL=update

# --- HikariCP Connection Pool Tuning (Render cold starts + Supabase free tier) ---
# Validate connection before use - prevents dead-connection errors after cold start
spring.datasource.hikari.connection-test-query=SELECT 1
# Keep 1 idle connection alive at all times
spring.datasource.hikari.minimum-idle=1
# Supabase free tier has limited connections - keep pool small
spring.datasource.hikari.maximum-pool-size=3
# Wait up to 30s to get a connection
spring.datasource.hikari.connection-timeout=30000
# Evict idle connections after 5 minutes
spring.datasource.hikari.idle-timeout=300000
# Replace connections older than 10 minutes (fixes stale connections after cold start)
spring.datasource.hikari.max-lifetime=600000
# Keepalive ping every 60s to prevent Supabase from closing idle connections
spring.datasource.hikari.keepalive-time=60000
